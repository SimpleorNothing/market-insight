# 동작: main으로 PR이 머지될 때마다 scripts/update-work-guide.mjs 가
# docs/WORK_GUIDE.md §7 이력 표에 해당 PR 한 줄을 자동 추가하고 커밋합니다.

name: Update work guide

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-guide:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Append merged PR to WORK_GUIDE history
        run: node scripts/update-work-guide.mjs
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/WORK_GUIDE.md
          git diff --cached --quiet || git commit -m "docs: 작업가이드 이력 자동 갱신 (PR #${{ github.event.pull_request.number }})"
          git push

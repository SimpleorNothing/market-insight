<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Market Sensing - 시장 동향을 Daily로 센싱합니다." />
  <title>Market Sensing</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
  />
  <link rel="stylesheet" href="assets/css/style.css?v=20260703" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div class="page-header__title">
        <h1>Market Sensing</h1>
        <p>시장 동향을 Daily로 센싱합니다.</p>
      </div>
      <div class="page-header__meta">
        <a class="da-launcher" href="https://samsungda.net" title="도구모음 열기">
          <span class="da-gi"><i></i><i></i><i></i><i></i></span>도구모음
        </a>
        <div class="meta-line" id="lastUpdated" title="뉴스 데이터 갱신 시점">
          <span class="meta-dot" aria-hidden="true"></span>
          <span id="updatedAtText">—</span>
        </div>
      </div>
    </header>

    <section class="stats-grid" aria-label="렌즈별 KPI">
      <div class="stat-card stat-card--neutral" data-lensgroup="" role="button" tabindex="0" aria-pressed="false">
        <p class="stat-card__label">전체</p>
        <p class="stat-card__value">
          <span id="statTotal">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
      <div class="stat-card stat-card--neutral" data-lensgroup="소비자" role="button" tabindex="0" aria-pressed="false">
        <p class="stat-card__label">소비자</p>
        <p class="stat-card__value">
          <span id="statConsumer">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
      <div class="stat-card stat-card--neutral" data-lensgroup="경쟁사" role="button" tabindex="0" aria-pressed="false">
        <p class="stat-card__label">경쟁사</p>
        <p class="stat-card__value">
          <span id="statCompetitorLens">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
      <div class="stat-card stat-card--neutral" data-lensgroup="기타" role="button" tabindex="0" aria-pressed="false">
        <p class="stat-card__label">기타</p>
        <p class="stat-card__value">
          <span id="statOther">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
    </section>

    <section class="filter-panel" aria-label="필터">
      <div class="filter-row">
        <span class="filter-row__label">검색</span>
        <input type="search" id="keywordSearch" class="keyword-search" placeholder="제목·요약·태그 검색" aria-label="키워드 검색" />
      </div>
      <div class="filter-row">
        <span class="filter-row__label">기간</span>
        <div class="filter-row__chips" id="periodChips" role="radiogroup"></div>
        <div class="date-range">
          <input type="date" id="dateFrom" class="date-range__input" aria-label="조회 시작일" />
          <span class="date-range__sep">~</span>
          <input type="date" id="dateTo" class="date-range__input" aria-label="조회 종료일" />
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-row__label">렌즈</span>
        <div class="filter-row__chips" id="lensChips" role="radiogroup"></div>
        <span class="filter-row__hint">단일선택</span>
      </div>
      <div class="filter-row" id="competitorRow">
        <span class="filter-row__label">경쟁사</span>
        <div class="filter-row__chips" id="competitorChips"></div>
        <span class="filter-row__hint">
          다중선택 · <span id="competitorCount">0</span>개
        </span>
      </div>
      <div class="filter-row" id="productRow">
        <span class="filter-row__label">제품</span>
        <div class="filter-row__chips" id="productChips"></div>
        <span class="filter-row__hint">
          다중선택 · <span id="productCount">0</span>개
        </span>
      </div>
      <div class="filter-hint-banner" id="filterHintBanner" hidden></div>
    </section>

    <section class="result-bar">
      <div class="result-bar__left">
        결과 <strong id="resultCount">0</strong>건
        <button class="tag-filter-clear" id="tagFilterClear" hidden>
          <span id="tagFilterLabel"></span>
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="result-bar__right">
        <div class="control-group">
          <span class="control-group__label">정렬</span>
          <select id="sortSelect">
            <option value="latest">최신순</option>
            <option value="impact">영향도순</option>
            <option value="relevance">관련도순</option>
          </select>
        </div>
        <div class="control-group">
          <span class="control-group__label">그룹</span>
          <select id="groupSelect">
            <option value="grade">액션 등급별</option>
            <option value="lens">렌즈별</option>
            <option value="competitor" selected>경쟁사별</option>
            <option value="product">제품별</option>
            <option value="none">그룹 없음</option>
          </select>
        </div>
        <div class="view-toggle" role="tablist" aria-label="뷰 전환">
          <button class="view-toggle__btn view-toggle__btn--active" data-view="card">
            <i class="ti ti-layout-cards" aria-hidden="true"></i>카드
          </button>
          <button class="view-toggle__btn" data-view="list">
            <i class="ti ti-list" aria-hidden="true"></i>리스트
          </button>
        </div>
      </div>
    </section>

    <section class="result-area" id="resultArea" aria-label="뉴스 결과"></section>

    <div class="empty-state" id="emptyState" hidden>
      <i class="ti ti-mood-empty" aria-hidden="true"></i>
      <p id="emptyMessage">조건에 맞는 뉴스가 없습니다.</p>
    </div>

    <footer class="page-footer">
      <i class="ti ti-info-circle" aria-hidden="true"></i>
      <span>
        각 카드의 [리포트 생성] 클릭 → 제품·분석 관점 선택 → 사업부 영향 docx 자동 생성
      </span>
    </footer>
  </main>

  <!-- Report generation modal -->
  <div class="modal" id="reportModal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel">
      <div class="modal__header">
        <h2 id="modalTitle">사업부 영향 리포트 생성</h2>
        <button class="modal__close" data-close aria-label="닫기">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>

      <div class="modal__body">
        <div class="modal__news-preview" id="modalNewsPreview"></div>

        <div class="modal__field">
          <label class="modal__field-label">대상 제품 (중복 선택 가능)</label>
          <div class="checkbox-group" id="productCheckboxGroup"></div>
        </div>

        <div class="modal__field">
          <label class="modal__field-label">분석 관점 (복수 선택 가능)</label>
          <div class="checkbox-group" id="analysisCheckboxGroup">
            <label class="checkbox-item">
              <input type="checkbox" name="analysisType" value="opp_threat" checked />
              <span>기회·위협 2축 분석</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="analysisType" value="timeaxis" />
              <span>시간축 임팩트</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="analysisType" value="valuechain" />
              <span>밸류체인 타격점</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="analysisType" value="positioning" />
              <span>경쟁 포지셔닝 변화</span>
            </label>
          </div>
        </div>

        <div class="modal__field modal__estimate" id="reportEstimate">
          <div class="modal__estimate-top">
            <span class="modal__estimate-label">
              <i class="ti ti-clock-hour-4" aria-hidden="true"></i> 예상 생성 시간
            </span>
            <span class="modal__estimate-value" id="estimateValue">약 38초</span>
          </div>
          <div class="modal__estimate-meter"><i id="estimateBar"></i></div>
          <p class="modal__estimate-note" id="estimateNote">분석 관점 1개 · 대상 제품 1개</p>
        </div>
      </div>

      <div class="modal__footer">
        <button class="btn btn--ghost" data-close>취소</button>
        <button class="btn btn--primary" id="generateBtn">
          <i class="ti ti-file-text" aria-hidden="true"></i>
          <span>리포트 생성</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden>
    <i class="ti ti-circle-check" aria-hidden="true"></i>
    <span id="toastMessage"></span>
  </div>

  <script src="assets/js/app.js?v=20260703"></script>
<!-- 도구모음 런처 (samsungda.net) — 화면 우상단 고정 (제목 위) -->
<style>
.da-launcher{position:fixed;top:14px;right:16px;z-index:2147483000;display:inline-flex;align-items:center;gap:6px;height:29px;padding:0 9px;border:1.5px solid #e6e9ee;border-radius:7px;background:rgba(255,255,255,.92);-webkit-backdrop-filter:saturate(180%) blur(6px);backdrop-filter:saturate(180%) blur(6px);text-decoration:none;color:#1a1d21;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:15px;font-weight:600;line-height:1;transition:.15s}
.da-launcher:hover{border-color:#1257d6;box-shadow:0 4px 18px rgba(18,87,214,.12)}
.da-launcher .da-gi{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:18px;height:18px}
.da-launcher .da-gi i{background:#5b6470;border-radius:1px;transition:.15s}
.da-launcher:hover .da-gi i{background:#1257d6}
</style>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DA Market Insight - 실시간 시장 동향 모니터링 보드" />
  <title>DA Market Insight</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
  />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div class="page-header__title">
        <h1>DA Market <em>Insight</em></h1>
        <p>실시간 시장 동향 모니터링 보드</p>
      </div>
      <div class="page-header__meta" id="lastUpdated">
        <span class="meta-dot" aria-hidden="true"></span>
        <span id="updatedAtText">—</span>
      </div>
    </header>

    <section class="stats-grid" aria-label="액션 등급별 KPI">
      <div class="stat-card stat-card--neutral">
        <p class="stat-card__label">금일 수집</p>
        <p class="stat-card__value">
          <span id="statTotal">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
      <div class="stat-card stat-card--urgent">
        <p class="stat-card__label">
          <i class="ti ti-diamond-filled" aria-hidden="true"></i>긴급
        </p>
        <p class="stat-card__value">
          <span id="statUrgent">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
      <div class="stat-card stat-card--major">
        <p class="stat-card__label">
          <span class="dot-amber" aria-hidden="true"></span>주요
        </p>
        <p class="stat-card__value">
          <span id="statMajor">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
      <div class="stat-card stat-card--watch">
        <p class="stat-card__label">
          <span class="dot-blue" aria-hidden="true"></span>주시
        </p>
        <p class="stat-card__value">
          <span id="statWatch">0</span><span class="stat-card__unit">건</span>
        </p>
      </div>
    </section>

    <section class="filter-panel" aria-label="필터">
      <div class="filter-row">
        <span class="filter-row__label">시각</span>
        <div class="filter-row__chips" id="lensChips" role="radiogroup"></div>
        <span class="filter-row__hint">단일선택</span>
      </div>
      <div class="filter-row" id="productRow">
        <span class="filter-row__label">제품</span>
        <div class="filter-row__chips" id="productChips"></div>
        <span class="filter-row__hint">
          다중선택 · <span id="productCount">0</span>개
        </span>
      </div>
      <div class="filter-row" id="competitorRow">
        <span class="filter-row__label">경쟁사</span>
        <div class="filter-row__chips" id="competitorChips"></div>
        <span class="filter-row__hint">
          다중선택 · <span id="competitorCount">0</span>개
        </span>
      </div>
      <div class="filter-hint-banner" id="filterHintBanner" hidden></div>
    </section>

    <section class="result-bar">
      <div class="result-bar__left">
        결과 <strong id="resultCount">0</strong>건
      </div>
      <div class="result-bar__right">
        <div class="control-group">
          <span class="control-group__label">정렬</span>
          <select id="sortSelect">
            <option value="latest">최신순</option>
            <option value="impact">영향도순</option>
            <option value="relevance">관련도순</option>
          </select>
        </div>
        <div class="control-group">
          <span class="control-group__label">그룹</span>
          <select id="groupSelect">
            <option value="grade">액션 등급별</option>
            <option value="lens">시각별</option>
            <option value="product">제품별</option>
            <option value="competitor">경쟁사별</option>
            <option value="none">그룹 없음</option>
          </select>
        </div>
        <div class="view-toggle" role="tablist" aria-label="뷰 전환">
          <button class="view-toggle__btn view-toggle__btn--active" data-view="card">
            <i class="ti ti-layout-cards" aria-hidden="true"></i>카드
          </button>
          <button class="view-toggle__btn" data-view="list">
            <i class="ti ti-list" aria-hidden="true"></i>리스트
          </button>
        </div>
      </div>
    </section>

    <section class="result-area" id="resultArea" aria-label="뉴스 결과"></section>

    <div class="empty-state" id="emptyState" hidden>
      <i class="ti ti-mood-empty" aria-hidden="true"></i>
      <p id="emptyMessage">조건에 맞는 뉴스가 없습니다.</p>
    </div>

    <footer class="page-footer">
      <i class="ti ti-info-circle" aria-hidden="true"></i>
      <span>
        각 카드의 [리포트 ↗] 클릭 → 제품 선택 → 기회·위협 1페이지 docx 자동 생성
      </span>
    </footer>
  </main>

  <!-- Report generation modal -->
  <div class="modal" id="reportModal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel">
      <div class="modal__header">
        <h2 id="modalTitle">사업부 영향 리포트 생성</h2>
        <button class="modal__close" data-close aria-label="닫기">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>

      <div class="modal__body">
        <div class="modal__news-preview" id="modalNewsPreview"></div>

        <div class="modal__field">
          <label class="modal__field-label">대상 제품 (중복 선택 가능)</label>
          <div class="checkbox-group" id="productCheckboxGroup"></div>
        </div>

        <div class="modal__field">
          <label class="modal__field-label">분석 관점</label>
          <div class="radio-group">
            <label class="radio-item radio-item--selected">
              <input type="radio" name="analysisType" value="opp_threat" checked />
              <span>기회·위협 2축 분석</span>
            </label>
          </div>
        </div>
      </div>

      <div class="modal__footer">
        <button class="btn btn--ghost" data-close>취소</button>
        <button class="btn btn--primary" id="generateBtn">
          <i class="ti ti-file-text" aria-hidden="true"></i>
          <span>리포트 생성</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden>
    <i class="ti ti-circle-check" aria-hidden="true"></i>
    <span id="toastMessage"></span>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
